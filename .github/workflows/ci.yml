name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test

      # Type-checks the whole app as part of the build — this is the project's
      # green bar (see AGENTS.md).
      - name: Build
        run: npm run build

      # The repo carries pre-existing lint debt (react-hooks style rules), so
      # lint reports but doesn't block. Tighten to blocking once it's paid off.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
